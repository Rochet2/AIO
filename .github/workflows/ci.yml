name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Lua 5.1
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1

      - name: Run unit tests
        run: lua5.1 tests/run.lua

      - name: Run Luacheck on core helpers
        uses: lunarmodules/luacheck@v1
        with:
          args: >-
            AIO_Server/queue.lua
            AIO_Client/queue.lua
            AIO_Server/aio_util.lua
            AIO_Client/aio_util.lua

      - name: Syntax-check AIO and tests
        run: |
          for f in AIO_Server/AIO.lua AIO_Client/AIO.lua tests/*.lua; do
            lua5.1 -e "assert(loadfile('$f'))"
          done

      - name: Verify server and client AIO.lua stay in sync
        run: diff -q AIO_Server/AIO.lua AIO_Client/AIO.lua

      - name: Verify server and client aio_util.lua stay in sync
        run: diff -q AIO_Server/aio_util.lua AIO_Client/aio_util.lua
