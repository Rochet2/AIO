name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Lua and Luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 liblua5.1-0-dev luarocks
          sudo luarocks install luacheck

      - name: Run unit tests
        run: lua5.1 tests/run.lua

      - name: Run Luacheck
        run: |
          luacheck \
            AIO_Server/queue.lua AIO_Client/queue.lua \
            AIO_Server/aio_util.lua AIO_Client/aio_util.lua \
            AIO_Server/AIO.lua AIO_Client/AIO.lua \
            tests/

      - name: Verify server and client AIO.lua stay in sync
        run: diff -q AIO_Server/AIO.lua AIO_Client/AIO.lua

      - name: Verify server and client aio_util.lua stay in sync
        run: diff -q AIO_Server/aio_util.lua AIO_Client/aio_util.lua
