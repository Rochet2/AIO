name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: leafo/gh-actions-lua@v9.3.0
        with:
          luaVersion: "5.1.5"

      - uses: leafo/gh-actions-luarocks@v4.3.0

      - name: Install Luacheck
        run: luarocks install luacheck

      - name: Run unit tests
        run: lua tests/run.lua

      - name: Run Luacheck on core helpers
        run: |
          luacheck \
            AIO_Server/queue.lua AIO_Client/queue.lua \
            AIO_Server/aio_util.lua AIO_Client/aio_util.lua

      - name: Syntax-check AIO and tests
        run: |
          for f in AIO_Server/AIO.lua AIO_Client/AIO.lua tests/*.lua; do
            lua -p "$f"
          done

      - name: Verify server and client AIO.lua stay in sync
        run: diff -q AIO_Server/AIO.lua AIO_Client/AIO.lua

      - name: Verify server and client aio_util.lua stay in sync
        run: diff -q AIO_Server/aio_util.lua AIO_Client/aio_util.lua
